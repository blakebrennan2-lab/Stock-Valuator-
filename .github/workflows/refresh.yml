name: Refresh prices (light)

on:
  schedule:
    - cron: "0 * * * *"   # hourly (GitHub may run a little late; that's fine)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Refresh picks' prices
        run: python run_refresh_prices.py
      - name: Commit refreshed prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --quiet --staged || git commit -m "prices: refresh $(date -u +'%F %H:%MZ')"
          git pull --rebase --autostash || true
          git push
