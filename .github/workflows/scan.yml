name: Scan and refresh

on:
  schedule:
    # Daily full re-analysis at 13:00 UTC (≈9am ET). GitHub cron can run late.
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # allow committing the refreshed docs/results.json

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the pipeline (scan -> Telegram -> results.json)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}   # optional (yfinance is default)
        run: python run_pipeline.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json state/
          git diff --quiet --staged || git commit -m "data: refresh $(date -u +%F)"
          git pull --rebase --autostash || true
          git push
