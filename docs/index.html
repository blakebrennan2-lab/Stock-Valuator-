<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Quality Dips</title>
  <meta name="theme-color" content="#0a0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quality Dips">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- critical inline styles: ink background + branded splash, no flash of white -->
  <style>
    html, body { margin: 0; background: #0a0c0f; color: #eef1f5;
      font-family: -apple-system, system-ui, sans-serif; }
    .splash { min-height: 88vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      animation: splashin .5s ease; }
    .splash svg { width: 76px; height: 76px; }
    .splash .wd { font-family: ui-serif, Georgia, serif; font-size: 24px;
      font-weight: 700; letter-spacing: -0.3px; }
    .splash .kk { color: #5e9ccc; font-size: 10px; font-weight: 700;
      letter-spacing: 2.4px; text-transform: uppercase; }
    @keyframes splashin { from { opacity: 0; transform: scale(.96); }
      to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="app" class="screen">
    <div class="splash">
      <svg viewBox="0 0 192 192" aria-hidden="true">
        <rect width="192" height="192" rx="42" fill="#14171c"/>
        <path d="M24 62 C 62 56, 76 64, 96 118 C 104 138 112 138 122 120 C 138 90 152 62 168 44"
              fill="none" stroke="#eef1f5" stroke-width="10" stroke-linecap="round"/>
        <circle cx="101" cy="127" r="15" fill="#5e9ccc"/>
      </svg>
      <div class="wd">Quality Dips</div>
      <div class="kk">Daily Value Screen</div>
    </div>
  </div>
  <script>
    // Load CSS + JS with a cache-busting query so iOS never serves a stale app.
    (function () {
      var v = "?t=" + Date.now();
      var link = document.createElement("link");
      link.rel = "stylesheet"; link.href = "styles.css" + v;
      document.head.appendChild(link);
      var s = document.createElement("script");
      s.src = "app.js" + v; document.body.appendChild(s);
    })();
  </script>
</body>
</html>
